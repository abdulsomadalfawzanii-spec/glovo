<body class="bg-gray-100 h-screen flex items-center justify-center relative">
  <!-- Logo -->
  <div class="absolute top-6 left-6">
    <a href="index.html">
      <img 
        src="download__1_-removebg-preview.png" 
        alt="Glovo Logo"
        class="w-28 md:w-32 object-contain"
      />
    </a>
  </div>

  <!-- Card -->
  <div class="bg-white w-full max-w-lg rounded-2xl p-8 md:p-10 shadow-lg relative text-center">

    <!-- Close Button -->
    <button 
      onclick="window.close()"
      class="absolute top-5 right-5 bg-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-200 cursor-pointer"
    >
      ✕
    </button>

    <!-- Heading -->
    <h2 class="text-4xl font-bold text-gray-800 mb-3">
      Welcome
    </h2>

    <p class="text-gray-500 mb-8">
      Continue with one of the following options
    </p>

    <!-- Labels -->
    <div class="flex justify-between text-sm text-gray-600 mb-2 px-1">
      <span>Prefix</span>
      <span>Phone number</span>
    </div>

    <!-- Phone Input -->
    <div class="flex gap-4 mb-6">

      <!-- Country Code -->
      <div class="flex items-center justify-between border rounded-xl px-4 py-3 w-1/3 bg-gray-50 cursor-pointer">
        <span class="text-sm text-gray-600">ES</span>

        <span class="font-medium ml-2">+34</span>

        <svg 
          class="w-4 h-4 text-gray-500 ml-auto"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path 
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </div>

      <!-- Phone Number -->
      <input
        type="tel"
        placeholder="Phone number"
        class="w-2/3 border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-600"
      />
    </div>

    <!-- reCAPTCHA -->
    <p class="text-sm text-gray-500 mb-8 leading-relaxed">
      This site is protected by reCAPTCHA and the Google
      <span class="text-green-700 font-medium cursor-pointer">
        Privacy Policy
      </span>
      and
      <span class="text-green-700 font-medium cursor-pointer">
        Terms of Service
      </span>
      apply.
    </p>

    <!-- Buttons -->
    <div class="flex gap-4 mb-6">

      <button class="w-1/2 bg-gray-200 text-green-800 py-3 rounded-full font-semibold hover:bg-gray-300 transition cursor-pointer">
        WhatsApp
      </button>

      <button class="w-1/2 bg-green-700 text-white py-3 rounded-full font-semibold hover:bg-green-800 transition cursor-pointer">
        SMS
      </button>
    </div>

    <!-- Divider -->
    <p class="text-gray-500 mb-5">
      or with
    </p>

    <!-- Google -->
    <button class="w-full border rounded-full py-3 flex items-center justify-center gap-3 hover:bg-gray-50 transition cursor-pointer">
      <img 
        src="https://www.svgrepo.com/show/475656/google-color.svg" 
        class="w-5 h-5"
      />

      <span class="font-medium text-gray-700">
        Google
      </span>
    </button>

    <!-- Facebook -->
    <button class="w-full border rounded-full py-3 flex items-center justify-center gap-3 mt-4 hover:bg-gray-50 transition cursor-pointer">
      <img 
        src="https://www.svgrepo.com/show/475647/facebook-color.svg" 
        class="w-5 h-5"
      />

      <span class="font-medium text-gray-700">
        Facebook
      </span>
    </button>

    <!-- Email -->
    <button class="w-full border rounded-full py-3 flex items-center justify-center gap-3 mt-4 hover:bg-gray-50 transition cursor-pointer">

      <svg 
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 text-gray-600"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path 
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M16 12H8m8 0l-8-6m8 6l-8 6"
        />
      </svg>

      <span class="font-medium text-gray-700">
        Email
      </span>
    </button>

    <!-- Footer -->
    <p class="text-sm text-gray-500 mt-6 leading-relaxed">
      By creating an account, you automatically accept our
      <span class="text-green-700 font-medium cursor-pointer">
        Terms of service
      </span>,
      <span class="text-green-700 font-medium cursor-pointer">
        Privacy Policy
      </span>
      and
      <span class="text-green-700 font-medium cursor-pointer">
        Cookies Policy
      </span>
    </p>
<style>
  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
</style>
  </div>
