<body class="bg-gray-100 min-h-screen flex items-center justify-center relative">
<nav class="mr-50">
  <a href="index.html"><img src="download__1_-removebg-preview.png" alt=""></a>
  </nav>

  <!-- Modal -->
  <div class="bg-white w-full max-w-lg rounded-2xl p-10 shadow-md relative text-center">

    <!-- Close Button -->
    <button class="absolute top-6 right-6 bg-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-200">
      ✕
    </button>

    <!-- Title -->
    <h2 class="text-4xl font-bold text-gray-800 mb-3">Welcome</h2>
    <p class="text-gray-500 mb-8">Continue with one of the following options</p>

    <!-- Input Labels -->
    <div class="flex justify-between text-sm text-gray-600 mb-2 px-1">
      <span>Prefix</span>
      <span class="mr-28">Phone number</span>
    </div>

    <!-- Inputs -->
    <div class="flex gap-4 mb-6">
      
      <!-- Prefix -->
      <div class="flex items-center justify-between border rounded-xl px-4 py-3 w-1/3 bg-gray-50">
        <span class="text-sm text-gray-600">ES</span>
        <span class="font-medium ml-2">+34</span>
        <svg class="w-4 h-4 text-gray-500 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </div>

      <!-- Phone -->
      <input 
        type="text"
        placeholder="Phone number"
        class="w-2/3 border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-600"
      >
    </div>

    <!-- Info -->
    <p class="text-sm text-gray-500 mb-8 leading-relaxed">
      This site is protected by reCAPTCHA and the Google 
      <span class="text-green-700 font-medium">Privacy Policy</span> 
      and 
      <span class="text-green-700 font-medium">Terms of Service</span> apply.
    </p>

    <!-- Buttons -->
    <div class="flex gap-4 mb-6">
      <button class="w-1/2 bg-gray-200 text-green-800 py-3 rounded-full font-semibold hover:bg-gray-300">
        WhatsApp
      </button>
      <button class="w-1/2 bg-green-700 text-white py-3 rounded-full font-semibold hover:bg-green-800">
        SMS
      </button>
    </div>

    <!-- Divider -->
    <p class="text-gray-500 mb-5">or with</p>

    <!-- Google -->
    <button class="w-full border rounded-full py-3 flex items-center justify-center gap-3 hover:bg-gray-50">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
      <span class="font-medium text-gray-700">Google</span>
    </button>

    <!-- Facebook -->
<button class="w-full border rounded-full py-3 flex items-center justify-center gap-3 mt-4 hover:bg-gray-50">
  <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5">
  <span class="font-medium text-gray-700">Facebook</span>
</button>

<!-- Email -->
<button class="w-full border rounded-full py-3 flex items-center justify-center gap-3 mt-4 hover:bg-gray-50">
  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
      d="M16 12H8m8 0l-8-6m8 6l-8 6"/>
  </svg>
  <span class="font-medium text-gray-700">Email</span>
</button>

<!-- Terms -->
<p class="text-sm text-gray-500 mt-6 leading-relaxed">
  By creating an account, you automatically accept our 
  <span class="text-green-700 font-medium">Terms of service</span>, 
  <span class="text-green-700 font-medium">Privacy Policy</span> 
  and 
  <span class="text-green-700 font-medium">Cookies Policy</span>
</p>
